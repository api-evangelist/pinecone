naftiko: 1.0.0-alpha2
info:
  label: Pinecone Admin API — API Keys
  description: 'Pinecone Admin API — API Keys. 5 operations. Lead operation: Get API key details. Self-contained Naftiko capability
    covering one Pinecone business surface.'
  tags:
  - Pinecone
  - API Keys
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    PINECONE_API_KEY: PINECONE_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-api-keys
    baseUri: https://api.pinecone.io
    description: Pinecone Admin API — API Keys business capability. Self-contained, no shared references.
    resources:
    - name: admin-api-keys-api_key_id
      path: /admin/api-keys/{api_key_id}
      operations:
      - name: fetchapikey
        method: GET
        description: Get API key details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Pinecone-Api-Version
          in: header
          type: string
          description: Required date-based version header
          required: true
        - name: api_key_id
          in: path
          type: string
          description: API key ID
          required: true
      - name: deleteapikey
        method: DELETE
        description: Delete an API key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Pinecone-Api-Version
          in: header
          type: string
          description: Required date-based version header
          required: true
        - name: api_key_id
          in: path
          type: string
          description: API key ID
          required: true
      - name: updateapikey
        method: PATCH
        description: Update an API key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Pinecone-Api-Version
          in: header
          type: string
          description: Required date-based version header
          required: true
        - name: api_key_id
          in: path
          type: string
          description: API key ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin-projects-project_id-api-keys
      path: /admin/projects/{project_id}/api-keys
      operations:
      - name: listprojectapikeys
        method: GET
        description: List API keys
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Pinecone-Api-Version
          in: header
          type: string
          description: Required date-based version header
          required: true
        - name: project_id
          in: path
          type: string
          description: Project ID
          required: true
      - name: createapikey
        method: POST
        description: Create an API key
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: X-Pinecone-Api-Version
          in: header
          type: string
          description: Required date-based version header
          required: true
        - name: project_id
          in: path
          type: string
          description: Project ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.PINECONE_API_KEY}}'
  exposes:
  - type: rest
    namespace: admin-api-keys-rest
    port: 8080
    description: REST adapter for Pinecone Admin API — API Keys. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin/api-keys/{api-key-id}
      name: admin-api-keys-api-key-id
      description: REST surface for admin-api-keys-api_key_id.
      operations:
      - method: GET
        name: fetchapikey
        description: Get API key details
        call: admin-api-keys.fetchapikey
        with:
          X-Pinecone-Api-Version: rest.X-Pinecone-Api-Version
          api_key_id: rest.api_key_id
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteapikey
        description: Delete an API key
        call: admin-api-keys.deleteapikey
        with:
          X-Pinecone-Api-Version: rest.X-Pinecone-Api-Version
          api_key_id: rest.api_key_id
        outputParameters:
        - type: object
          mapping: $.
      - method: PATCH
        name: updateapikey
        description: Update an API key
        call: admin-api-keys.updateapikey
        with:
          X-Pinecone-Api-Version: rest.X-Pinecone-Api-Version
          api_key_id: rest.api_key_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/projects/{project-id}/api-keys
      name: admin-projects-project-id-api-keys
      description: REST surface for admin-projects-project_id-api-keys.
      operations:
      - method: GET
        name: listprojectapikeys
        description: List API keys
        call: admin-api-keys.listprojectapikeys
        with:
          X-Pinecone-Api-Version: rest.X-Pinecone-Api-Version
          project_id: rest.project_id
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createapikey
        description: Create an API key
        call: admin-api-keys.createapikey
        with:
          X-Pinecone-Api-Version: rest.X-Pinecone-Api-Version
          project_id: rest.project_id
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-api-keys-mcp
    port: 9090
    transport: http
    description: MCP adapter for Pinecone Admin API — API Keys. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: get-api-key-details
      description: Get API key details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-api-keys.fetchapikey
      with:
        X-Pinecone-Api-Version: tools.X-Pinecone-Api-Version
        api_key_id: tools.api_key_id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-api-key
      description: Delete an API key
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: admin-api-keys.deleteapikey
      with:
        X-Pinecone-Api-Version: tools.X-Pinecone-Api-Version
        api_key_id: tools.api_key_id
      outputParameters:
      - type: object
        mapping: $.
    - name: update-api-key
      description: Update an API key
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: admin-api-keys.updateapikey
      with:
        X-Pinecone-Api-Version: tools.X-Pinecone-Api-Version
        api_key_id: tools.api_key_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-api-keys
      description: List API keys
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-api-keys.listprojectapikeys
      with:
        X-Pinecone-Api-Version: tools.X-Pinecone-Api-Version
        project_id: tools.project_id
      outputParameters:
      - type: object
        mapping: $.
    - name: create-api-key
      description: Create an API key
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-api-keys.createapikey
      with:
        X-Pinecone-Api-Version: tools.X-Pinecone-Api-Version
        project_id: tools.project_id
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
