aid: pinecone
name: Pinecone
description: With its vector database at the core, Pinecone is the leading knowledge platform for building
  accurate, secure, and scalable AI applications. The Pinecone APIs cover Database (vector storage and
  search), Inference (embeddings and reranking), Assistant (RAG over documents), and Admin (organization
  and project management).
kind: contract
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json-icons/introduction-pinecone-docs.png
tags:
  - Vector Databases
  - AI
  - Embeddings
  - RAG
created: '2024-07-02'
modified: '2026-05-04'
url: https://raw.githubusercontent.com/api-evangelist/pinecone/refs/heads/main/apis.yml
specificationVersion: '0.19'
apis:
  - aid: pinecone:pinecone-database-control
    name: Pinecone Database Control API
    description: Use the Database Control API to manage indexes, collections, and backups in Pinecone
      Database. The control plane handles lifecycle and configuration of vector storage resources.
    humanURL: https://docs.pinecone.io/reference/api/introduction
    baseURL: https://api.pinecone.io
    tags:
      - Vector Databases
      - Indexes
      - Control Plane
    properties:
      - type: Documentation
        url: https://docs.pinecone.io/reference/api/introduction
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/pinecone/refs/heads/main/openapi/pinecone-db-control-openapi.yaml
  - aid: pinecone:pinecone-database-data
    name: Pinecone Database Data API
    description: Use the Database Data API to upsert, query, fetch, update, and delete vector records
      in Pinecone indexes. The data plane is the high-throughput interface for real-time vector search.
    humanURL: https://docs.pinecone.io/reference/api/introduction
    baseURL: https://{index_host}
    tags:
      - Vector Databases
      - Vectors
      - Data Plane
    properties:
      - type: Documentation
        url: https://docs.pinecone.io/reference/api/introduction
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/pinecone/refs/heads/main/openapi/pinecone-db-data-openapi.yaml
  - aid: pinecone:pinecone-inference
    name: Pinecone Inference API
    description: Use the Inference API to generate vector embeddings and rerank results using models hosted
      on Pinecone's infrastructure.
    humanURL: https://docs.pinecone.io/reference/api/introduction#inference-api
    baseURL: https://api.pinecone.io
    tags:
      - Embeddings
      - Reranking
      - AI
    properties:
      - type: Documentation
        url: https://docs.pinecone.io/reference/api/introduction#inference-api
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/pinecone/refs/heads/main/openapi/pinecone-inference-openapi.yaml
  - aid: pinecone:pinecone-assistant-control
    name: Pinecone Assistant Control API
    description: Use the Assistant Control API to create and manage Pinecone Assistants for retrieval-augmented
      generation (RAG) over your documents.
    humanURL: https://docs.pinecone.io/reference/api/introduction#assistant-api
    baseURL: https://api.pinecone.io
    tags:
      - Assistants
      - RAG
      - Control Plane
    properties:
      - type: Documentation
        url: https://docs.pinecone.io/reference/api/introduction#assistant-api
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/pinecone/refs/heads/main/openapi/pinecone-assistant-control-openapi.yaml
  - aid: pinecone:pinecone-assistant-data
    name: Pinecone Assistant Data API
    description: Use the Assistant Data API to upload documents to a Pinecone Assistant, ask questions,
      and receive responses grounded in those documents.
    humanURL: https://docs.pinecone.io/reference/api/introduction#assistant-api
    baseURL: https://prod-1-data.ke.pinecone.io
    tags:
      - Assistants
      - RAG
      - Data Plane
    properties:
      - type: Documentation
        url: https://docs.pinecone.io/reference/api/introduction#assistant-api
      - type: OpenAPI
