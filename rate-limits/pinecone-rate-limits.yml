specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Pinecone
providerId: pinecone
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Rate Limiting
  - Vector Database
description: Pinecone Serverless concurrency-based rate limits per index.
sources:
  - https://www.pinecone.io/pricing/
  - https://docs.pinecone.io/guides/manage-cost/manage-cost
headers: {}
responseCodes:
  throttled: 429
limits:
  - name: Index throughput
    scope: index
    metric: queries_per_second
    limit: scales with read units
  - name: Concurrent operations
    scope: index
    metric: concurrent
    limit: varies
  - name: Bulk import
    scope: index
    metric: concurrent_imports
    limit: 10
  - name: Records per upsert
    scope: request
    metric: vectors
    limit: 1000
    timeFrame: request
